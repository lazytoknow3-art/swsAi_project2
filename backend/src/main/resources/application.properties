spring.application.name=document-management-system

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/dms_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=200MB

# App Config
app.upload.base-dir=uploads
app.upload.max-file-size-bytes=52428800
app.jwt.secret=dms-super-secret-jwt-key-must-be-at-least-256-bits-long-for-hs256
app.jwt.expiration=86400000

# Async
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=20
spring.task.execution.pool.queue-capacity=100

# Logging
logging.level.com.dms=INFO
logging.level.org.springframework.web=WARN

server.port=8080
